---
- name: Deploy VirtInfra Monitor v50 PostgreSQL Native
  hosts: monitors
  become: "{{ (ansible_user | default('root')) != 'root' }}"
  gather_facts: false

  vars:
    bw_monitor_domain: ""
    bw_monitor_email: ""
    bw_monitor_public_ip: ""
    bw_monitor_port: 8080
    bw_monitor_admin_user: admin
    bw_monitor_admin_password: ""
    bw_monitor_token: ""
    bw_monitor_timezone: Asia/Ho_Chi_Minh
    bw_monitor_firewall: false
    bw_monitor_ssh_port: ""
    bw_monitor_redis_cache: false
    bw_monitor_run_retention_now: false

  pre_tasks:
    - name: Validate Monitor variables
      ansible.builtin.assert:
        that:
          - bw_monitor_admin_password | length >= 12
          - (bw_monitor_domain | length == 0) or (bw_monitor_email | length > 3)
          - (bw_monitor_domain | length > 0) or (bw_monitor_public_ip | length > 0)
        fail_msg: >-
          Set a 12+ character Admin password. Set domain+email or public IP.
      no_log: true

  tasks:
    - name: Create temporary source directory
      ansible.builtin.tempfile:
        state: directory
        prefix: bw-monitor-v50-
      register: bw_monitor_tmp

    - name: Copy complete repository source
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../"
        dest: "{{ bw_monitor_tmp.path }}/"
        owner: root
        group: root
        mode: preserve

    - name: Build installer arguments
      ansible.builtin.set_fact:
        bw_monitor_install_args: >-
          --port {{ bw_monitor_port }}
          --admin-user {{ bw_monitor_admin_user | quote }}
          --timezone {{ bw_monitor_timezone | quote }}
          {{ ('--domain ' + (bw_monitor_domain | quote) + ' --email ' + (bw_monitor_email | quote)) if (bw_monitor_domain | length > 0) else ('--public-ip ' + (bw_monitor_public_ip | quote)) }}
          {{ '--redis-cache' if bw_monitor_redis_cache | bool else '' }}
          {{ '--run-retention-now' if bw_monitor_run_retention_now | bool else '' }}
          {{ '--firewall' if bw_monitor_firewall | bool else '' }}
          {{ ('--ssh-port ' + (bw_monitor_ssh_port | string | quote)) if (bw_monitor_ssh_port | string | length > 0) else '' }}

    - name: Run PostgreSQL Native installer
      ansible.builtin.shell: >-
        bash {{ bw_monitor_tmp.path }}/install.sh {{ bw_monitor_install_args }}
      args:
        executable: /bin/bash
      environment:
        BW_ADMIN_PASSWORD: "{{ bw_monitor_admin_password }}"
        BW_MONITOR_TOKEN: "{{ bw_monitor_token }}"
      no_log: true

    - name: Verify Monitor with management doctor
      ansible.builtin.command: bw-monitorctl doctor
      register: bw_monitor_doctor
      changed_when: false

    - name: Show deployment result
      ansible.builtin.debug:
        msg:
          - "VirtInfra Monitor v50 deployed"
          - "Credentials: /root/bw-monitor-credentials.env"
          - "{{ bw_monitor_doctor.stdout_lines | default([]) }}"

    - name: Remove temporary source directory
      ansible.builtin.file:
        path: "{{ bw_monitor_tmp.path }}"
        state: absent
