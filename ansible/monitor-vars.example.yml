# Encrypt the production copy with ansible-vault.
bw_monitor_domain: "monitor.example.com"
bw_monitor_email: "ops@example.com"
bw_monitor_public_ip: ""
bw_monitor_port: 8080
bw_monitor_admin_user: "admin"
bw_monitor_admin_password: "CHANGE_ME_TO_A_LONG_PASSWORD"
# Empty means the installer generates a strong bwm_push_* token.
bw_monitor_token: ""
bw_monitor_timezone: "Asia/Ho_Chi_Minh"

# Optional. Redis is page cache only, disabled by default.
bw_monitor_redis_cache: false
bw_monitor_run_retention_now: false
bw_monitor_firewall: true
bw_monitor_ssh_port: "22"
